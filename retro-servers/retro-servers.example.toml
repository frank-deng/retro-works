log_file="~/.retro-servers.log"
log_level="INFO"
pid_file="~/.retro-servers.pid"
detach=true
watchdog_timeout=10
modules=[
"retroservers:MailCenter",
"retroservers:WebServer",
"retroservers:POP3Server",
"retroservers:SMTPServer",
"retroservers:FTP2SFTPBridgeServer",
"retroservers:TelnetServerSSH"
"retroservers:FTPTermuxServer",
"retroservers:TelnetServerTermux",
"retroservers:HTTPFileServer"
]

[web]
host="127.0.0.1"
port=8080
encoding="gbk"
links=[
{label="邮件中心",href="/mail.asp"},
{label="天气预报",href="/weather.asp"}
]
news_page_size=30
image_max_size=[360,960]
inline_image=true
news_api="xxx"
weather_api="xxx"
weather_key="xxx"

[HTTPFileServer]
host="127.0.0.1"
port=8081
encoding="gbk"
pagesize=40
rootdir="/sdcard/devel"
index=["index.html","index.htm"]

[mail]
pagesize=40
host="mysite.com"

[mail.db]
db_file='~/.mail.db'
maxsize=10
minsize=2
idle_timeout=30

[mail.pop3]
host="127.0.0.1"
port=8110
encoding="gbk"

[mail.smtp]
host="127.0.0.1"
port=8025
encoding="gbk"

[[mail.users]]
uid=100
username="username"
password="sha256_hash"

[[mail.users]]
uid=1
username="deepseek"
url="https://api.deepseek.com/chat/completions"
api_key="xxx"
model="deepseek-v4-pro"
thinking={type="enabled"}
system_message="请不要使用任何emoji表情符号"

[[mail.users]]
uid=2
username="erine"
url="https://qianfan.baidubce.com/v2/chat/completions"
api_key="xxx"
model="ernie-5.0"
thinking={type="enabled"}
web_search={enabled=true}
system_message="请不要使用任何emoji表情符号"

[[TelnetServerSSH.servers]]
host="127.0.0.1"
port=8023
max_connection=10
buf_size=4096
ssh_host="host1"
ssh_port=22
term="ansi"
rows=24
columns=80
client_encoding="gbk"
server_encoding="utf-8"

[[FTP2SFTPBridgeServer.servers]]
host="127.0.0.1"
port=8021
pasv_addr="10.0.2.2"
pasv_port_start=10000
pasv_port_end=10010
sftp_host="host1"
sftp_port=22
max_connections=10
encoding="gbk"

[TelnetServerTermux]
host="127.0.0.1"
port=8023
max_connection=10
buf_size=4096
username="username"
password="sha256_hash"
shell="/bin/bash"
term="ansi"
rows=24
columns=80
client_encoding="gbk"
server_encoding="utf-8"

[FTPTermuxServer]
host="127.0.0.1"
port=8021
pasv_addr="10.0.2.2"
pasv_port_start=10000
pasv_port_end=10010
max_connections=10
encoding="gbk"
username="username"
password="sha256_hash"

